<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pix2Pix cGAN | Task-04</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="brutalist-container">
        <header>
            <div class="header-content">
                <h1>GAN_TRANSLATOR.v4</h1>
                <span class="tag">PRODIGY INFOTECH // TASK-04</span>
            </div>
        </header>

        <main>
            <section class="control-panel">
                <div class="card">
                    <div class="card-header">1. SOURCE_INPUT</div>
                    <div class="card-body">
                        <div class="drop-zone" id="dropZone">
                            <p id="fileNameDisplay">CLICK OR DRAG IMAGE HERE</p>
                            <input type="file" id="fileInput" hidden accept="image/*">
                        </div>
                        <button class="action-btn" id="generateBtn">
                            START TRANSLATION
                        </button>
                    </div>
                </div>

                <div class="card" id="outputCard">
                    <div class="card-header">2. GENERATED_OUTPUT</div>
                    <div class="card-body result-container">
                        <div id="loader" class="hidden">NEURAL_PROCESSING_IN_PROGRESS...</div>
                        <img id="outputImg" src="" alt="Neural Network Output" class="hidden">
                        <div id="placeholderText">IMAGE WILL APPEAR HERE</div>
                    </div>
                </div>
            </section>
        </main>

        <footer>
            <div class="footer-bar">
                GEN-AI MODULE // SYSTEM_STATUS: READY
            </div>
        </footer>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const generateBtn = document.getElementById('generateBtn');
        const outputImg = document.getElementById('outputImg');
        const loader = document.getElementById('loader');
        const placeholder = document.getElementById('placeholderText');
        const fileNameDisplay = document.getElementById('fileNameDisplay');

        dropZone.onclick = () => fileInput.click();

        fileInput.onchange = (e) => {
            if (e.target.files.length > 0) {
                fileNameDisplay.innerText = e.target.files[0].name;
                fileNameDisplay.style.color = "#00ff95";
            }
        };

        generateBtn.onclick = async () => {
            if (!fileInput.files[0]) return alert("Please select an image first.");

            loader.classList.remove('hidden');
            outputImg.classList.add('hidden');
            placeholder.classList.add('hidden');
            generateBtn.disabled = true;
            generateBtn.innerText = "TRANSLATING...";

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            try {
                const response = await fetch('/predict', { method: 'POST', body: formData });
                const data = await response.json();
                
                if (data.image) {
                    outputImg.src = `data:image/png;base64,${data.image}`;
                    outputImg.classList.remove('hidden');
                    loader.classList.add('hidden');
                }
            } catch (err) {
                alert("Translation failed. Check if your Flask server is running.");
            } finally {
                generateBtn.disabled = false;
                generateBtn.innerText = "START TRANSLATION";
            }
        };
    </script>
</body>
</html>
