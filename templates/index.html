<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Sketch-to-Photo | Task 4</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>GEN-AI <span>Task 04</span></h1>
            <p>Transforming Sketches into High-Fidelity Imagery via Pix2Pix GAN</p>
        </header>

        <main class="card">
            <div class="upload-section">
                <input type="file" id="imageInput" accept="image/*" hidden>
                <button class="btn primary" onclick="document.getElementById('imageInput').click()">Upload Sketch</button>
                <button class="btn success" id="generateBtn">Generate Photo</button>
            </div>

            <div class="display-grid">
                <div class="view-box">
                    <h3>Input Sketch</h3>
                    <div class="preview" id="inputPreview">
                        <span>No image uploaded</span>
                    </div>
                </div>
                <div class="view-box">
                    <h3>AI Generation</h3>
                    <div class="preview" id="outputPreview">
                        <span>Waiting for input...</span>
                    </div>
                </div>
            </div>
            
            <div id="loader" class="loader hidden">Processing with GPU...</div>
        </main>
    </div>

    <script>
        const imageInput = document.getElementById('imageInput');
        const generateBtn = document.getElementById('generateBtn');
        const inputPreview = document.getElementById('inputPreview');
        const outputPreview = document.getElementById('outputPreview');
        const loader = document.getElementById('loader');

        imageInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    inputPreview.innerHTML = `<img src="${event.target.result}" alt="Input">`;
                };
                reader.readAsDataURL(file);
            }
        };

        generateBtn.onclick = async () => {
            const file = imageInput.files[0];
            if (!file) return alert("Please upload an image first!");

            const formData = new FormData();
            formData.append('file', file);

            loader.classList.remove('hidden');
            outputPreview.innerHTML = "";

            try {
                const response = await fetch('/predict', { method: 'POST', body: formData });
                const data = await response.json();
                
                if (data.image) {
                    outputPreview.innerHTML = `<img src="data:image/png;base64,${data.image}" alt="Output">`;
                } else {
                    alert("Error generating image.");
                }
            } catch (err) {
                console.error(err);
                alert("Server Error. Ensure app.py is running.");
            } finally {
                loader.classList.add('hidden');
            }
        };
    </script>
</body>
</html>
